name: Merge Pull Requests into 'main'

on:
  push:
    branches: [master,main]

permissions:
  packages: write

env:
  DOTNET_NOLOGO: true

jobs:
  integration_tests:
    name: Run integration tests (Linux + Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: |
            10.0.x

      - run: dotnet restore tests/RedisMemoryCacheInvalidation.Tests/RedisMemoryCacheInvalidation.Tests.csproj --verbosity minimal

      - name: Run integration tests (Testcontainers)
        run: dotnet test tests/RedisMemoryCacheInvalidation.Tests/RedisMemoryCacheInvalidation.Tests.csproj --configuration Release --framework net10.0 --no-restore --verbosity minimal

  build_and_create_a_nuget:
    name: Build and create a BETA NuGet package (GPR)
    needs: integration_tests
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build version prefix/suffix
        shell: pwsh
        run: |
          "VERSION_PREFIX=${{ github.run_number }}.0.0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VERSION_SUFFIX=beta.${{ github.run_attempt }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: |
            10.0.x

      - run: dotnet restore --verbosity minimal

      - run: dotnet build --configuration Release -p:ContinuousIntegrationBuild=true -p:VersionPrefix=$env:VERSION_PREFIX --version-suffix $env:VERSION_SUFFIX


      - name: Pack NuGet (library only)
        run: dotnet pack src/RedisMemoryCacheInvalidation/RedisMemoryCacheInvalidation.csproj --configuration Release --no-build --output ./artifacts -p:VersionPrefix=$env:VERSION_PREFIX --version-suffix $env:VERSION_SUFFIX -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Publish artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: NuGetPackage.${{ env.VERSION_PREFIX }}-${{ env.VERSION_SUFFIX }}.nupkg.zip
          path: ./artifacts/*

      - name: Publish to GPR
        shell: pwsh
        run: |
          dotnet nuget push "./artifacts/*.nupkg" `
            --no-symbols `
            --api-key "${{ secrets.GITHUB_TOKEN }}" `
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}"
