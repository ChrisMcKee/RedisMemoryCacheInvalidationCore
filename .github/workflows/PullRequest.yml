name: Pull Request

on:
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true

jobs:
  build_and_pack_release:
    name: Build and pack release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build version prefix/suffix
        shell: pwsh
        run: |
          "VERSION_PREFIX=${{ github.run_number }}.0.0" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "VERSION_SUFFIX=alpha.${{ github.run_attempt }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0

      - run: dotnet restore --verbosity minimal

      - run: dotnet build --configuration Release -p:ContinuousIntegrationBuild=true -p:VersionPrefix=$env:VERSION_PREFIX --version-suffix $env:VERSION_SUFFIX

      - name: Run integration tests (Testcontainers)
        run: dotnet test tests/RedisMemoryCacheInvalidation.Tests/ --configuration Release --no-build --verbosity minimal
