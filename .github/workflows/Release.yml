name: Publish to Nuget.org

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write

env:
  DOTNET_NOLOGO: true

jobs:
  build_and_create_a_nuget:
    name: Build and create a NuGet package (GPR and NuGet.org)
    runs-on: windows-latest

    steps:
      - name: Calculate version from the Commit Tag
        shell: pwsh
        run: |
          $releaseVersion = $env:GITHUB_REF -replace '^refs/.*/', ''
          "RELEASE_VERSION=$releaseVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0

      - run: dotnet restore --verbosity minimal

      - run: dotnet build --configuration Release -p:ContinuousIntegrationBuild=true -p:version=${{ env.RELEASE_VERSION }}

      - name: Run integration tests (Testcontainers)
        run: dotnet test tests/RedisMemoryCacheInvalidation.Tests/ --configuration Release --no-build --verbosity minimal

      - run: dotnet pack src/RedisMemoryCacheInvalidation/RedisMemoryCacheInvalidation.csproj --configuration Release --no-build --output ./artifacts -p:version=${{ env.RELEASE_VERSION }} -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg

      - name: Publish artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          path: ./artifacts/*

      - name: Upload release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          name: NuGetPackage.${{ env.RELEASE_VERSION }}.nupkg.zip
          files: ./artifacts/*

      - name: Publish to GPR
        shell: pwsh
        run: |
          dotnet nuget push "./artifacts/*.nupkg" `
            --no-symbols `
            --api-key "${{ secrets.GITHUB_TOKEN }}" `
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}"

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: login
        with:
          user: ChrisMcKee

      - name: Publish to nuget.org
        shell: pwsh
        run: |
          dotnet nuget push "./artifacts/*.nupkg" `
            --api-key "${{steps.login.outputs.NUGET_API_KEY}}" `
            --source "https://api.nuget.org/v3/index.json"
